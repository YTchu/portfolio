<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>匯率計算機</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border: none; background: none; }

.v-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e2d2b;
}

.v-phone {
  background: #5a7873;
  width: 100%;
  max-width: 414px;
  min-width: 320px;
  border-radius: 40px;
  position: relative;
  overflow: hidden;
}

.v-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  padding: 64px 0 24px;
}

/* --- Display --- */
.v-display {
  background: rgba(0,0,0,0.15);
  border-radius: 16px;
  padding: 16px;
  width: calc(100% - 48px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.v-main-row {
  position: relative;
  height: 56px;
}

.v-flag-btn {
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.1s;
}
.v-flag-btn:active { transform: translateY(-50%) scale(0.95); }

.v-flag-circle {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 50%;
}

.v-number-area {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  max-width: calc(100% - 66px);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  overflow: hidden;
}

.v-expr {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  overflow-x: auto;
  max-width: 100%;
  scrollbar-width: none;
}
.v-expr::-webkit-scrollbar { display: none; }

.v-num {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: clamp(24px, 8vw, 48px);
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
  overflow-x: auto;
  max-width: 100%;
  text-align: right;
  scrollbar-width: none;
}
.v-num::-webkit-scrollbar { display: none; }

/* --- Currency section --- */
.v-cur-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.v-cur-label {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 12px;
  color: rgba(0,0,0,0.3);
}

.v-cur-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.v-cur-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  min-width: 0;
  cursor: pointer;
  transition: transform 0.1s;
}
.v-cur-btn:active { transform: scale(0.95); }

.v-flag-sm {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}

.v-amt {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 20px;
  color: rgba(255,255,255,0.8);
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.v-divider {
  background: rgba(0,0,0,0.15);
  width: 1px;
  height: 32px;
  flex-shrink: 0;
}

/* --- Keyboard --- */
.v-keyboard {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
  width: calc(100% - 48px);
}

.v-key {
  cursor: pointer;
  transition: transform 0.1s;
  aspect-ratio: 1;
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.v-key:active { transform: scale(0.95); }

.v-key-plus {
  grid-row: span 2;
  aspect-ratio: unset;
  align-self: stretch;
}

.btn-svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* --- Marquee --- */
.v-mq-wrap {
  background: rgba(0,0,0,0.1);
  border-radius: 12px;
  height: 32px;
  width: calc(100% - 48px);
  overflow: hidden;
  position: relative;
  box-shadow: inset 0px 1px 2px 0px rgba(0,0,0,0.2);
  display: flex;
  align-items: center;
  padding: 0 8px;
}

.v-mq-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
}

.v-mq-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: v-pulse 1.5s ease-in-out infinite;
}

.v-mq-text {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
}

@keyframes v-pulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.v-mq-scroll {
  width: 100%;
  overflow: hidden;
  height: 100%;
  display: flex !important;
  align-items: center;
}

.v-mq-inner {
  display: inline-block;
  white-space: nowrap;
  animation: v-mq-scroll 120s linear infinite;
  will-change: transform;
}
.v-mq-inner:hover { animation-play-state: paused; }

@keyframes v-mq-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.mq-item {
  display: inline-block;
  margin-right: 24px;
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 12px;
}
.mq-code  { color: rgba(255,255,255,0.8); font-weight: 400; }
.mq-rate  { color: rgba(255,255,255,0.6); margin-left: 6px; }
.mq-change { margin-left: 6px; }

/* --- Menu --- */
.v-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  border-radius: 40px;
  z-index: 40;
}
.v-backdrop.open { opacity: 1; pointer-events: auto; }

.v-menu-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 550px;
  background: #333333;
  border-radius: 24px 24px 0 0;
  box-shadow: 0px -6px 12px 0px rgba(0,0,0,0.3);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  z-index: 50;
  overflow: hidden;
}
.v-menu-panel.open { transform: translateY(0); }

.v-search-wrap {
  position: absolute;
  height: 48px;
  left: 24px;
  right: 24px;
  top: 32px;
}
.v-search-bg {
  position: absolute;
  background: rgba(255,255,255,0.2);
  inset: 0;
  border-radius: 48px;
}
.v-search-input {
  position: absolute;
  inset: 0;
  background: transparent;
  padding: 0 16px;
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 20px;
  color: white;
  outline: none;
}
.v-search-input::placeholder { color: rgba(255,255,255,0.4); }

.v-cur-list-wrap {
  position: absolute;
  left: 24px;
  right: 24px;
  top: 96px;
  bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.v-cur-list { position: relative; }

/* Currency list items */
.cli {
  position: absolute;
  height: 72px;
  left: 0;
  right: 0;
  cursor: pointer;
  transition: background 0.1s;
}
.cli:hover { background: rgba(255,255,255,0.05); }

.cli-click {
  position: absolute;
  inset: 0;
  right: 52px;
  display: flex;
  align-items: center;
}

.cli-flag {
  position: absolute;
  left: 16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}

.cli-info {
  position: absolute;
  left: 72px;
  right: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 2px;
  overflow: hidden;
}

.cli-top {
  display: flex;
  align-items: baseline;
  gap: 8px;
  overflow: hidden;
}
.cli-code {
  font-family: Roboto, sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: white;
  flex-shrink: 0;
}
.cli-name {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.cli-bot {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cli-region {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
}
.cli-rate {
  font-family: Roboto, sans-serif;
  font-weight: 300;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
}

.cli-fav {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  padding: 8px;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.1s;
}
.cli-fav:hover { transform: translateY(-50%) scale(1.1); }
.cli-fav:active { transform: translateY(-50%) scale(0.9); }

.cli-line {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

@media (max-width: 414px) {
  .v-phone { border-radius: 0; min-height: 100vh; }
}


</style>
</head>
<body style="margin:0;padding:0;">

<div class="v-wrapper">
  <div class="v-phone">

      <!-- Display -->

        </button>
      </div>

      <!-- Marquee -->
      <div class="v-mq-wrap">
        <div id="v-mq-loading" class="v-mq-loading">
          <div class="v-mq-dot"></div>
          <span class="v-mq-text">載入匯率中...</span>
        </div>
        <div id="v-mq-scroll" class="v-mq-scroll" style="display:none">
          <div id="v-mq-inner" class="v-mq-inner"></div>
        </div>
      </div>

    </div>

    <!-- Menu backdrop (inside phone for clipping) -->
    <div id="v-backdrop" class="v-backdrop"></div>

    <!-- Menu panel -->
    <div id="v-menu" class="v-menu-panel">
      <div class="v-search-wrap">
        <div class="v-search-bg"></div>
        <input type="text" id="v-search" class="v-search-input" placeholder="Enter country name"/>

// === CALCULATOR ===
function calc(a, b, op) {
  if (op === '+') return a + b;
  if (op === '-') return a - b;
  if (op === '×') return a * b;
  if (op === '÷') return b !== 0 ? a / b : 0;
  return b;
}
function pressNum(n) {
  if (S.resetOnNext) { S.display = n; S.resetOnNext = false; }
  else if (S.display === '0' && n !== '.') { S.display = n; }
  else if (n === '.' && S.display.indexOf('.') !== -1) { return; }
  else { S.display += n; }
  renderDisplay();
}
function pressOp(op) {
  var cur = parseFloat(S.display);
  if (S.prevVal !== null && S.operator && !S.resetOnNext) {
    var result = calc(S.prevVal, cur, S.operator);
    S.prevVal = result; S.expression = result + ' ' + op; S.display = result.toString();
  } else { S.prevVal = cur; S.expression = S.display + ' ' + op; }
  S.operator = op; S.resetOnNext = true;
  renderDisplay();
}
function pressEquals() {
  if (S.prevVal !== null && S.operator) {
    var cur = parseFloat(S.display);
    var result = calc(S.prevVal, cur, S.operator);
    S.expression = S.prevVal + ' ' + S.operator + ' ' + cur + ' =';
    S.display = result.toString();
    S.prevVal = null; S.operator = null; S.resetOnNext = true;
    renderDisplay();
  }
}
function pressClear() {

}

}

// === EXCHANGE RATES ===
function updateRates(rates) {
  var now = new Date();
  var baselineRates = {};
  var shouldUpdateBaseline = false;
  try {
    var sr = localStorage.getItem('baseline30MinRates');
    var st = localStorage.getItem('baseline30MinTime');
    if (sr && st) {
      baselineRates = JSON.parse(sr);
      var mins = (now.getTime() - new Date(st).getTime()) / 60000;
      if (mins >= 30) shouldUpdateBaseline = true;
    } else { shouldUpdateBaseline = true; }
  } catch(e) {}

  S.rates = rates; S.loading = false;
  var changes = {};
  var codes = Object.keys(rates);

  if (Object.keys(baselineRates).length > 0) {
    codes.forEach(function(code) {
      if (baselineRates[code]) {
        var pct = ((rates[code] - baselineRates[code]) / baselineRates[code]) * 100;
        changes[code] = { pct: Math.abs(pct), dir: pct > 0.001 ? 'up' : pct < -0.001 ? 'down' : 'neutral' };
      } else { changes[code] = { pct: 0, dir: 'neutral' }; }
    });
    if (shouldUpdateBaseline) {
      try { localStorage.setItem('baseline30MinRates', JSON.stringify(rates)); localStorage.setItem('baseline30MinTime', now.toISOString()); } catch(e) {}
    }
  } else {
    codes.forEach(function(code) {
      var seed = 0;
      for (var j = 0; j < code.length; j++) seed += code.charCodeAt(j);
      var r1 = ((seed * 9301 + 49297) % 233280) / 233280;
      var r2 = ((seed * 4561 + 51349) % 243000) / 243000;
      var sim;
      if (r1 < 0.42)      sim =  0.05 + r2 * 0.75;
      else if (r1 < 0.84) sim = -(0.05 + r2 * 0.75);
      else if (r1 < 0.95) sim = r1 < 0.895 ?  0.8 + r2 * 0.7 : -(0.8 + r2 * 0.7);
      else                 sim = r1 < 0.975 ?  1.5 + r2 * 0.7 : -(1.5 + r2 * 0.7);
      changes[code] = { pct: Math.abs(sim), dir: sim > 0.02 ? 'up' : sim < -0.02 ? 'down' : 'neutral' };
    });
    var baseline = {};
    codes.forEach(function(code) {
      var ch = changes[code];
      var mult = ch.dir === 'up' ? 1 - ch.pct / 100 : ch.dir === 'down' ? 1 + ch.pct / 100 : 1;
      baseline[code] = rates[code] * mult;
    });
    try { localStorage.setItem('baseline30MinRates', JSON.stringify(baseline)); localStorage.setItem('baseline30MinTime', now.toISOString()); } catch(e) {}
  }

  S.changes = changes;
  try { localStorage.setItem('currentExchangeRates', JSON.stringify(rates)); localStorage.setItem('lastRateUpdate', now.toISOString()); } catch(e) {}
  renderMarquee();
  renderDisplay();
}

function detectLocation() {
  try {
    var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    var cc = TIMEZONE_MAP[tz] || 'tw';
    var cur = CURRENCIES.find(function(c){ return c.country === cc; });
    if (cur) { S.mainCur = cur; renderDisplay(); }
  } catch(e) {}
}
